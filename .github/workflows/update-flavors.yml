name: Update Flavors Daily

permissions:
  contents: write
  actions: write

on:
  schedule:
    # GitHub cron uses UTC. Vancouver remains on year-round daylight time
    # after B.C.'s final spring-forward on March 8, 2026, so these run at 1:00 PM
    # and 4:30 PM Vancouver time.
    - cron: '0 20 * * *'
    - cron: '30 23 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-flavors:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          
      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium
        
      - name: Scrape flavor data
        run: node scripts/scrape-flavors.js
        
      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet src/data/flavors.json src/data/flavor-descriptions.json src/data/metadata.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/flavors.json src/data/flavor-descriptions.json src/data/metadata.json
          git commit -m "Update flavor data - $(date +'%Y-%m-%d')"
          git push origin HEAD:main

      - name: Trigger deploy workflow
        if: steps.check-changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            });
