name: Update Flavors Daily

permissions:
  contents: write
  actions: write

on:
  schedule:
    # GitHub cron uses UTC. These two runs cover 12:15 PM Vancouver time
    # across daylight saving time; the first step below skips the wrong one.
    - cron: '15 19 * * *'
    - cron: '15 20 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-flavors:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check Vancouver schedule
        id: schedule-check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "$(TZ=America/Vancouver date +'%H:%M')" = "12:15" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.schedule-check.outputs.should_run == 'true'
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        if: steps.schedule-check.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          cache: npm
          
      - name: Install dependencies
        if: steps.schedule-check.outputs.should_run == 'true'
        run: npm ci
        
      - name: Install Playwright
        if: steps.schedule-check.outputs.should_run == 'true'
        run: npx playwright install chromium
        
      - name: Scrape flavor data
        if: steps.schedule-check.outputs.should_run == 'true'
        run: node scripts/scrape-flavors.js
        
      - name: Check for changes
        if: steps.schedule-check.outputs.should_run == 'true'
        id: check-changes
        run: |
          if git diff --quiet src/data/flavors.json src/data/metadata.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          
      - name: Commit and push changes
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data/flavors.json src/data/metadata.json
          git commit -m "Update flavor data - $(date +'%Y-%m-%d')"
          git push

      - name: Trigger deploy workflow
        if: steps.check-changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            });
